<!DOCTYPE html>
<head>
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex align-items-center">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="card shadow-sm p-4">

          <div class="text-center mb-3">
            <h2><b>DebateHub</b></h2>
          </div>

          <h4 class="text-center mb-4">Create Account</h4>

          <form>

            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" id="username" class="form-control" placeholder="bestdebater123">
              <small id="username-error" class="text-danger"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-control" placeholder="john@email.com">
              <small id="email-error" class="text-danger"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-control" placeholder="* * * * * * *">
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" id="confirm-password" class="form-control" placeholder="* * * * * * *">
              <small id="password-error" class="text-danger"></small>
            </div>

            <div class="text-center mb-3">
              <button type = "submit" class="btn btn-primary px-4">Sign Up</a>
            </div>
          </form>

          <p class="text-center mt-3 mb-0">
            Already have an account? <a href="login.html">Log in</a>
          </p>

        </div>

      </div>
    </div>
  </div>

  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
  
      // Email validation
      const email = document.getElementById('email').value;
      const emailError = document.getElementById('email-error');
      if (!email.includes('@') || !email.includes('.')) {
        emailError.textContent = 'Please enter a valid email address.';
        valid = false;
      } else {
        emailError.textContent = '';
      }
  
      // Password match validation
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const passwordError = document.getElementById('password-error');
      if (password !== confirmPassword) {
        passwordError.textContent = 'Passwords do not match.';
        valid = false;
      } else {
        passwordError.textContent = '';
      }
  
      if (valid) {
        // Submit the form / redirect
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
