<!DOCTYPE html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex align-items-center">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="card shadow-sm p-4">

          <div class="text-center mb-3">
            <h2><b>DebateHub</b></h2>
          </div>

          <h4 class="text-center mb-4">Welcome Back!</h4>

          <form>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="text" class="form-control" placeholder="john@email.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="* * * * * * *">
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label"> Remember me</label>
                <span class ="float-end"><a href="forgot-password.html">Forgot Password?</a></span>
            </div>
            
            <div class="text-center mb-3">
              <a href="dashboard.html" class="btn btn-primary px-4">Login</a>
            </div>

          </form>

          <p class="text-center mt-3 mb-0">
            Don't have an account? Sign-up here. <a href="sign-up.html">Sign-up</a>
          </p>

        </div>

      </div>
    </div>
  </div>

</body>
</html>
