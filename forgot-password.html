<!DOCTYPE html>
<head>
  <title>forgot-password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<script>
    function showAlert() {
      document.getElementById('successAlert').classList.remove('d-none');
    }
  </script>

<body class="d-flex align-items-center">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="card shadow-sm p-4">

          <div class="text-center mb-3">
            <h2><b>Debate</b></h2>
          </div>

          <h4 class="text-center mb-4">Reset Password</h4>

          <div id="successAlert" class="alert alert-success d-none" role="alert">
            A link has been sent to your email address containing instructions to reset your password.
          </div>

          <form>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="text" class="form-control" placeholder="john@emial.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Email Address</label>
              <input type="password" class="form-control" placeholder="* * * * * * *">
            </div>

            <button type="button" class="btn btn-dark w-100" onclick="showAlert()">
                Send Reset Link
              </button>


          </form>

          <p class="text-center mt-3 mb-0">
            Have an account? Sign-Up here. <a href="sign-up.html">Sign-up</a>
          </p>

        </div>

      </div>
    </div>
  </div>

</body>
</html>
