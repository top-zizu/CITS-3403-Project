<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateHub</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header>
  <nav>
    <h1>DebateHub</h1>

    <ul class="nav-links">
      <li><i class="fa-solid fa-house"></i> Home</li>
      <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
      <li><i class="fa-solid fa-chart-column"></i> Dashboard</li>
      <li><i class="fa-solid fa-trophy"></i> Leaderboard</li>
    </ul>

    <button class="primary-btn">
      <i class="fa-solid fa-plus"></i>
      New Debate
    </button>
  </nav>
</header>

<main>
  <section class="filters">
    <button class="active">All</button>
    <button>Active</button>
    <button>Ended</button>
  </section>

  <section class="debates">
    <!-- Debates will be added dynamically -->
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
