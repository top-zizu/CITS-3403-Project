<!DOCTYPE html>
<html lang="en">
<head>
  <title>Dashboard | DebateHub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style_dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
  <script src="{{ url_for('static', filename='dashboard.js') }}" defer></script>
</head>

<body>
  <div id="nav-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="dashboard-main">
    <section class="dashboard-header">
      <div>
        <h1>Your Dashboard</h1>
        <p>Track your debates, votes, comments, and current activity.</p>
      </div>

      <a href="/debates/create" class="dashboard-create-btn">+ New Debate</a>
    </section>

    <section class="dashboard-stats">
      <div class="stat-card">
        <span>Points</span>
        <strong>1,247</strong>
      </div>

      <div class="stat-card">
        <span>Debates</span>
        <strong>42</strong>
      </div>

      <div class="stat-card">
        <span>Comments</span>
        <strong>87</strong>
      </div>

      <div class="stat-card">
        <span>Win Rate</span>
        <strong>68%</strong>
      </div>
    </section>

    <section class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="ended">Ended</button>
    </section>

    <section class="debates" id="debates"></section>
  </main>
</body>
</html>
