<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Dashboard | DebateHub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_dark_mode.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_searchdebates.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_debatecards.css') }}">

  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='dashboard.js') }}" defer></script>
</head>

<body>
  <div id="nav-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="dashboard-main">
    <section class="dashboard-header">
      <div>
        <h1>Your Dashboard</h1>
        <p>Quickly search for any debates that you have interacted with.</p>
      </div>

      <a href="/debates/create" class="dashboard-create-btn">+ New Debate</a>
    </section>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="search-input"
        type="search"
        id="debate-search"
        placeholder="Search your debates…"
        autocomplete="off"
      />
    </div>

    <section class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="ended">Ended</button>
    </section>

    <section class="debates" id="debates"></section>
  </main>
</body>
</html>
