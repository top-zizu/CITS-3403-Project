<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Debate — Enter Access Code</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_dark_mode.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_debate_access.css') }}">

</head>
<body>
    <div class="access-box">
        <h2>🔒 Private Debate</h2>
        <p>This debate is private. Enter the access code shared by the creator.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input
                type="text"
                name="access_code"
                placeholder="Access code"
                maxlength="10"
                autofocus
                required
            >
            <button type="submit">Enter</button>
        </form>

        <a class="back-link" href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
    </div>
</body>
</html>
