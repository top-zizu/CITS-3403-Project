<!DOCTYPE html>
<html lang="en"> 
<head>
  <title>Create Debate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
  <link rel="stylesheet" href="../static/style_create_debate.css">
  <script src="../static/main.js" defer></script>

<body>

<div id="nav-placeholder"></div>

<main>
  <div class="page-header">
    <h1>Create New Debate</h1>
    <p>Start a discussion and let the community decide</p>
  </div>

  <div class="card">

    <!-- Prompt -->
    <div class="field">
      <label for="prompt">Debate Prompt</label>
      <textarea id="prompt" placeholder="e.g., Pineapple belongs on pizza" rows="4"></textarea>
      <p class="field-hint">Keep it clear and concise. Avoid biased language.</p>
    </div>

    <div class="divider"></div>

    <!-- Tags -->
    <div class="field">
      <label>Select Tags (up to 3)</label>
      <div class="tags-wrap" id="tags-wrap">
        <!-- Tags injected by JS -->
      </div>
      <p class="tag-count" id="tag-count">0/3 tags selected</p>
    </div>

    <div class="divider"></div>

    <!-- Duration -->
    <div class="field">
      <label for="duration">Duration</label>
      <div class="slider-row">
        <input type="range" id="duration" min="1" max="168" value="24" />
        <span class="duration-val" id="duration-val">24 hours</span>
      </div>
      <p class="field-hint">How long should this debate remain open? (1–168 hours)</p>
    </div>

    <div class="divider"></div>

    <!-- Private -->
    <div class="checkbox-row">
      <input type="checkbox" id="private" />
      <div class="cb-label">
        <strong>Private Debate</strong>
        <span>Only people with the link can view and participate</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="handleCancel()">Cancel</button>
      <button class="btn btn-submit" id="submit-btn" disabled onclick="handleSubmit()">Create Debate</button>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  /* ─── Tag data ─────────────────────────────────────────────── */
  const TAG_DATA = [
    { id: 'politics',      icon: '🏛️' },
    { id: 'technology',    icon: '💻' },
    { id: 'lifestyle',     icon: '🌿' },
    { id: 'food',          icon: '🍕' },
    { id: 'work',          icon: '💼' },
    { id: 'animals',       icon: '🐾' },
    { id: 'sports',        icon: '⚽' },
    { id: 'entertainment', icon: '🎬' },
  ];

  const MAX_TAGS = 3;
  let selectedTags = new Set();

  /* ─── Render tags ──────────────────────────────────────────── */
  const wrap = document.getElementById('tags-wrap');

  TAG_DATA.forEach(({ id, icon }) => {
    const btn = document.createElement('button');
    btn.className = 'tag';
    btn.dataset.tag = id;
    btn.innerHTML = `<span>${icon}</span> ${id}`;
    btn.addEventListener('click', () => toggleTag(id, btn));
    wrap.appendChild(btn);
  });

  function toggleTag(id, btn) {
    if (selectedTags.has(id)) {
      selectedTags.delete(id);
      btn.classList.remove('selected');
    } else {
      if (selectedTags.size >= MAX_TAGS) return;
      selectedTags.add(id);
      btn.classList.add('selected');
    }
    updateTagState();
  }

  function updateTagState() {
    const count = selectedTags.size;
    document.getElementById('tag-count').textContent = `${count}/${MAX_TAGS} tags selected`;
    document.querySelectorAll('.tag').forEach(btn => {
      const isSelected = selectedTags.has(btn.dataset.tag);
      const atMax = count >= MAX_TAGS && !isSelected;
      btn.classList.toggle('disabled', atMax);
    });
    validateForm();
  }

  /* ─── Duration slider ──────────────────────────────────────── */
  const slider = document.getElementById('duration');
  const durVal  = document.getElementById('duration-val');

  function updateSliderBackground() {
    const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
    slider.style.background =
      `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
  }

  slider.addEventListener('input', () => {
    const h = parseInt(slider.value);
    durVal.textContent = h === 1 ? '1 hour' : `${h} hours`;
    updateSliderBackground();
  });

  updateSliderBackground();

  /* ─── Form validation ──────────────────────────────────────── */
  const promptEl  = document.getElementById('prompt');
  const submitBtn = document.getElementById('submit-btn');

  promptEl.addEventListener('input', validateForm);

  function validateForm() {
    const hasPrompt = promptEl.value.trim().length > 0;
    submitBtn.disabled = !hasPrompt;
  }

  /* ─── Nav active link ──────────────────────────────────────── */
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });

  /* ─── Actions ──────────────────────────────────────────────── */
  function handleCancel() {
    if (promptEl.value.trim() || selectedTags.size) {
      if (confirm('Discard this debate?')) resetForm();
    }
  }

  function handleSubmit() {
    const data = {
      prompt:   promptEl.value.trim(),
      tags:     [...selectedTags],
      duration: parseInt(slider.value),
      private:  document.getElementById('private').checked,
    };
    console.log('Debate created:', data);
    showToast('🎉 Debate created successfully!');
    resetForm();
  }

  function resetForm() {
    promptEl.value = '';
    selectedTags.clear();
    document.querySelectorAll('.tag').forEach(b => b.classList.remove('selected', 'disabled'));
    slider.value = 24;
    durVal.textContent = '24 hours';
    updateSliderBackground();
    document.getElementById('private').checked = false;
    document.getElementById('tag-count').textContent = '0/3 tags selected';
    validateForm();
  }

  /* ─── Toast ────────────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
