<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Saved Debates | DebateHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_searchdebates.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_dark_mode.css') }}">
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='saved_debates.js') }}" defer></script>
  <style>
    .save-btn {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; cursor: pointer;
      padding: 4px; border-radius: 6px; color: var(--accent);
      transition: transform .15s; z-index: 2; display: flex; align-items: center;
    }
    .save-btn svg { width: 22px; height: 22px; }
    .save-btn:hover { transform: scale(1.12); }
    .debate-card { position: relative; }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>
<div id="sidebar-placeholder"></div>

<main>
  <div class="page-header">
    <h1>Saved Debates</h1>
    <p>Check in with the debates that have caught your attention!</p>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search debates..."/>
  </div>

  <div class="filter-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </svg>
    Filter by Tags
  </div>
  <div class="filter-tags" id="filter-tags"></div>

  <div id="debates-list"></div>
  <div class="empty-state" id="empty-state">No saved debates yet.</div>
</main>

</body>
</html>
