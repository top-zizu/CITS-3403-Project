<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Friends | DebateHub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_friends.css') }}">

  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='friends.js') }}" defer></script>
</head>

<body>
  <div id="nav-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="friends-main">
    <section class="friends-header">
      <h1>Friends</h1>
      <p>Manage who you follow, who follows you, and discover more debaters.</p>
    </section>

    <section class="friends-tabs">
      <button class="friends-tab active" data-tab="following">Following</button>
      <button class="friends-tab" data-tab="followers">Followers</button>
      <button class="friends-tab" data-tab="discover">Discover</button>
    </section>

    <section class="friends-search">
      <input id="friends-search-input" type="text" placeholder="Search users...">
    </section>

    <section class="friends-card">
      <div id="friends-list"></div>
    </section>
  </main>
</body>
</html>
