<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Search Debate</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_searchdebates.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_debatecards.css') }}">

  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='searchdebates.js') }}" defer></script>
</head>
<body data-guest="{{ 'false' if current_user.is_authenticated else 'true' }}">
  <div id="nav-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main>
    <div class="page-header">
      <h1>Discover Debates</h1>
      <p>Find debates based on your interests and follows</p>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search-input" type="text" placeholder="Search debates...">
    </div>

    <div class="filter-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      Filter by Tags
    </div>
    <div class="filter-tags" id="filter-tags"></div>

    <div class="section-heading">
      <h2>Recommended for You</h2>
      <p>Based on real debates from the community</p>
    </div>

    <div id="debates-list"></div>
    <div class="empty-state" id="empty-state">No debates match your search or filters.</div>
  </main>
</body>
</html>
