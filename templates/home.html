<!DOCTYPE html>
<html lang="en">
<head>
  <title>Home | DebateHub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_home.css') }}">

  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='home.js') }}" defer></script>
</head>

<body>
  <div id="nav-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="home-main">

    <section class="home-hero">
      <div>
        <h1>Welcome back, DebateMaster</h1>
        <p>Jump into active debates, track your progress, and discover new topics.</p>
      </div>

      <a href="/debates/create" class="home-create-btn">+ New Debate</a>
    </section>

    <section class="home-grid">

      <!-- FOR YOU -->
      <div class="home-card large-card">
        <h2>For You</h2>
        <div id="for-you-debates">
          <p class="activity" style="color: var(--muted); font-size: 0.9rem;">Loading debates…</p>
        </div>
      </div>

      <!-- STATS -->
      <div class="home-card">
        <h2>Your Stats</h2>

        <div class="stat-row">
          <span>Points</span>
          <strong id="home-stat-points">—</strong>
        </div>

        <div class="stat-row">
          <span>Debates</span>
          <strong id="home-stat-debates">—</strong>
        </div>

        <div class="stat-row">
          <span>Comments</span>
          <strong id="home-stat-comments">—</strong>
        </div>
      </div>

      <!-- TRENDING -->
      <div class="home-card">
        <h2>Trending Topics</h2>

        <a href="/search?topic=ai" class="topic-pill">AI</a>
        <a href="/search?topic=politics" class="topic-pill">Politics</a>
        <a href="/search?topic=gaming" class="topic-pill">Gaming</a>
        <a href="/search?topic=philosophy" class="topic-pill">Philosophy</a>
      </div>

      <!-- FRIEND ACTIVITY -->
      <div class="home-card">
        <h2>Friend Activity</h2>
        <div id="friend-activity">
          <p class="activity" style="color: var(--muted); font-size: 0.9rem;">Loading activity…</p>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
