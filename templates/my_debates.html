<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>My Debates | DebateHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_sidebar.css') }}">
  <script src="{{ url_for('static', filename='sidebar.js') }}" defer></script>
  <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  <script src="{{ url_for('static', filename='my_debates.js') }}" defer></script>
  <style>
    .delete-btn {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; color: #999;
      transition: color .15s, background .15s; z-index: 2;
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-family: inherit;
    }
    .delete-btn svg { width: 16px; height: 16px; }
    .delete-btn:hover { color: #e05252; background: rgba(224,82,82,.08); }
    .delete-confirm {
      position: absolute; top: 10px; right: 10px;
      display: none; align-items: center; gap: 6px; z-index: 2;
    }
    .delete-confirm.visible { display: flex; }
    .delete-confirm-label { font-size: 12px; color: #e05252; font-weight: 600; white-space: nowrap; }
    .delete-confirm-yes {
      background: #e05252; color: #fff; border: none; border-radius: 5px;
      padding: 4px 10px; font-size: 12px; cursor: pointer; font-weight: 600;
    }
    .delete-confirm-yes:hover { background: #c03a3a; }
    .delete-confirm-no {
      background: none; border: 1px solid #ccc; border-radius: 5px;
      padding: 4px 8px; font-size: 12px; cursor: pointer; color: #666;
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>
<div id="sidebar-placeholder"></div>

<main>
  <div class="page-header">
    <h1>Your Debates</h1>
    <p>Check in with the debates you have created.</p>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search debates..."/>
  </div>

  <div class="filter-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </svg>
    Filter by Tags
  </div>
  <div class="filter-tags" id="filter-tags"></div>

  <div id="debates-list"></div>
  <div class="empty-state" id="empty-state">No debates match your search or filters.</div>
</main>

<script>
  const DEBATES = [
    {% for debate in debates %}
    {
      id: {{ debate.id }},
      prompt: {{ debate.title | tojson }},
      timer: {% if debate.is_active %}'Expires {{ debate.expires_at.strftime("%d %b") }}'
             {% else %}'Ended {{ debate.expires_at.strftime("%d %b") }}'{% endif %},
      is_active: {{ 'true' if debate.is_active else 'false' }},
      agree:    {{ debate.agree_votes }},
      disagree: {{ debate.disagree_votes }},
      comments: {{ debate.comments | length }},
      tags:     [{{ debate.category | tojson }}],
      voted:    null,
      voting:   false,
    },
    {% endfor %}
  ];

  const ALL_TAGS = ['politics','technology','lifestyle','food','work','animals','sports','entertainment'];
  let activeFilters = new Set();
  let searchQuery = '';

  function getCsrf() {
    return document.querySelector('meta[name="csrf-token"]').content;
  }

  const filterWrap = document.getElementById('filter-tags');
  ALL_TAGS.forEach(tag => {
    const btn = document.createElement('button');
    btn.className   = 'filter-tag';
    btn.dataset.tag = tag;
    btn.innerHTML   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
      <line x1="7" y1="7" x2="7.01" y2="7"/>
    </svg>${tag}`;
    btn.addEventListener('click', () => {
      activeFilters.has(tag) ? activeFilters.delete(tag) : activeFilters.add(tag);
      btn.classList.toggle('active', activeFilters.has(tag));
      renderDebates();
    });
    filterWrap.appendChild(btn);
  });

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderDebates();
  });

  function getFiltered() {
    return DEBATES.filter(d => {
      const matchSearch = !searchQuery || d.prompt.toLowerCase().includes(searchQuery);
      const matchTags   = activeFilters.size === 0 || d.tags.some(t => activeFilters.has(t));
      return matchSearch && matchTags;
    });
  }

  function renderDebates() {
    const list     = document.getElementById('debates-list');
    const empty    = document.getElementById('empty-state');
    const filtered = getFiltered();
    list.innerHTML = '';
    empty.style.display = filtered.length === 0 ? 'block' : 'none';

    filtered.forEach((debate, i) => {
      const total       = debate.agree + debate.disagree;
      const agreePct    = total === 0 ? 50 : ((debate.agree / total) * 100).toFixed(1);
      const disagreePct = (100 - agreePct).toFixed(1);
      const showCounts  = !debate.is_active;

      const card = document.createElement('div');
      card.className = 'debate-card';
      card.style.animationDelay = `${i * 60}ms`;
      card.innerHTML = `
        <button class="delete-btn" onclick="askDelete(${debate.id})" title="Delete debate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
          Delete
        </button>
        <div class="delete-confirm" id="delete-confirm-${debate.id}">
          <span class="delete-confirm-label">Are you sure?</span>
          <button class="delete-confirm-yes" onclick="confirmDelete(${debate.id})">Delete</button>
          <button class="delete-confirm-no"  onclick="cancelDelete(${debate.id})">Cancel</button>
        </div>
        <div class="card-timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          ${debate.timer}
        </div>
        <div class="card-prompt">${debate.prompt}</div>
        <div class="vote-row">
          <button class="vote-btn agree ${debate.voted==='agree'?'voted':''}" onclick="vote(${debate.id},'agree')" ${!debate.is_active ? 'disabled' : ''}>
            <div class="vote-label">Agree</div>
            ${showCounts ? `<div class="vote-count" id="agree-count-${debate.id}">${debate.agree.toLocaleString()}</div><div class="vote-pct" id="agree-pct-${debate.id}">${agreePct}%</div>` : `<div class="vote-count" id="agree-count-${debate.id}" style="display:none"></div><div class="vote-pct" id="agree-pct-${debate.id}" style="display:none"></div>`}
          </button>
          <button class="vote-btn disagree ${debate.voted==='disagree'?'voted':''}" onclick="vote(${debate.id},'disagree')" ${!debate.is_active ? 'disabled' : ''}>
            <div class="vote-label">Disagree</div>
            ${showCounts ? `<div class="vote-count" id="disagree-count-${debate.id}">${debate.disagree.toLocaleString()}</div><div class="vote-pct" id="disagree-pct-${debate.id}">${disagreePct}%</div>` : `<div class="vote-count" id="disagree-count-${debate.id}" style="display:none"></div><div class="vote-pct" id="disagree-pct-${debate.id}" style="display:none"></div>`}
          </button>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-${debate.id}" style="width:${showCounts ? agreePct : 50}%"></div>
        </div>
        <div class="card-footer">
          <a href="/debate/${debate.id}" class="comment-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            ${debate.comments} Comments
          </a>
          <div class="card-tags">
            ${debate.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
        </div>`;

      card.style.cursor = 'pointer';
      card.addEventListener('click', e => {
        if (!e.target.closest('button') && !e.target.closest('a'))
          window.location.href = `/debate/${debate.id}`;
      });
      list.appendChild(card);
    });
  }

  function vote(id, side) {
    const debate = DEBATES.find(d => d.id === id);
    if (!debate || !debate.is_active || debate.voting) return;

    debate.voting = true;

    fetch(`/debates/${id}/vote`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-CSRFToken': getCsrf(),
      },
      body: `vote_type=${side}`,
    })
    .then(r => r.json())
    .then(data => {
      debate.voting = false;
      if (data.error) { alert(data.error); return; }

      if (data.removed) {
        debate[debate.voted]--;
        debate.voted = null;
      } else if (data.changed) {
        const oldSide = debate.voted;
        debate[oldSide]--;
        debate[side]++;
        debate.voted = side;
      } else {
        debate[side]++;
        debate.voted = side;
      }

      const total    = debate.agree + debate.disagree;
      const agreePct = total === 0 ? 50 : ((debate.agree / total) * 100).toFixed(1);

      if (debate.is_active === false) {
        document.getElementById(`agree-count-${id}`).textContent    = debate.agree.toLocaleString();
        document.getElementById(`disagree-count-${id}`).textContent = debate.disagree.toLocaleString();
        document.getElementById(`agree-pct-${id}`).textContent      = `${agreePct}%`;
        document.getElementById(`disagree-pct-${id}`).textContent   = `${(100 - agreePct).toFixed(1)}%`;
        document.getElementById(`progress-${id}`).style.width       = `${agreePct}%`;
      }

      const card = document.getElementById(`agree-count-${id}`).closest('.debate-card');
      card.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('voted'));
      if (debate.voted) {
        card.querySelector(`.vote-btn.${debate.voted}`).classList.add('voted');
      }
    })
    .catch(() => {
      debate.voting = false;
      alert('Something went wrong. Please try again.');
    });
  }

  function askDelete(id) {
    document.getElementById(`delete-confirm-${id}`).classList.add('visible');
    const card = document.getElementById(`delete-confirm-${id}`).closest('.debate-card');
    card.querySelector('.delete-btn').style.display = 'none';
  }

  function cancelDelete(id) {
    document.getElementById(`delete-confirm-${id}`).classList.remove('visible');
    const card = document.getElementById(`delete-confirm-${id}`).closest('.debate-card');
    card.querySelector('.delete-btn').style.display = '';
  }

  function confirmDelete(id) {
    fetch(`/debates/${id}/delete`, {
      method: 'POST',
      headers: { 'X-CSRFToken': getCsrf() },
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) { alert(data.error); return; }
      const idx = DEBATES.findIndex(d => d.id === id);
      if (idx !== -1) DEBATES.splice(idx, 1);
      renderDebates();
    })
    .catch(() => alert('Delete failed. Please try again.'));
  }

  renderDebates();
</script>
</body>
</html>
